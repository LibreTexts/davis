name: Release

on:
  workflow_dispatch:

jobs:
  authorize:
    name: Authorize User
    runs-on: ubuntu-latest
    steps:
      - name: Check if user is authorized
        run: |
          AUTHORIZED_USERS="${{ secrets.DEPLOYMENT_AUTHORIZED_USERS }}"
          CURRENT_USER="${{ github.actor }}"

          if [ -z "$AUTHORIZED_USERS" ]; then
            echo "❌ DEPLOYMENT_AUTHORIZED_USERS secret is not set"
            exit 1
          fi

          # Convert comma-separated list to array and check if user is in list
          IFS=',' read -ra USERS <<< "$AUTHORIZED_USERS"
          AUTHORIZED=false

          for user in "${USERS[@]}"; do
            # Trim whitespace
            user=$(echo "$user" | xargs)
            if [ "$user" = "$CURRENT_USER" ]; then
              AUTHORIZED=true
              break
            fi
          done

          if [ "$AUTHORIZED" = true ]; then
            echo "✅ User '$CURRENT_USER' is authorized to run this workflow"
          else
            echo "❌ User '$CURRENT_USER' is not authorized to run this workflow"
            echo "Authorized users: $AUTHORIZED_USERS"
            exit 1
          fi

  validate-all:
    name: Validate All Packages
    needs: authorize
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build all packages
        run: |
          npm run build -w @libretexts/davis-core
          npm run build -w @libretexts/davis-react
          npm run build -w @libretexts/davis-vue
          npm run build -w @libretexts/davis-docs

  release-core:
    needs: [authorize, validate-all]
    name: Release Core Package
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Configure Git
        run: |
          git config --global user.name "libretexts-bot"
          git config --global user.email "dev@libretexts.org"
          git remote set-url origin https://x-access-token:${{ secrets.LIBREBOT_ACCESS_TOKEN }}@github.com/${{ github.repository }}.git

      - name: Build core package
        run: npm run build -w @libretexts/davis-core

      - name: Release core package
        env:
          GITHUB_TOKEN: ${{ secrets.LIBREBOT_ACCESS_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          GIT_COMMITTER_NAME: libretexts-bot
          GIT_COMMITTER_EMAIL: dev@libretexts.org
          GIT_AUTHOR_NAME: libretexts-bot
          GIT_AUTHOR_EMAIL: dev@libretexts.org
        run: npx semantic-release
        working-directory: packages/core

  release-react:
    name: Release React Package
    runs-on: ubuntu-latest
    needs: [authorize, validate-all, release-core]
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Configure Git
        run: |
          git config --global user.name "libretexts-bot"
          git config --global user.email "dev@libretexts.org"
          git remote set-url origin https://x-access-token:${{ secrets.LIBREBOT_ACCESS_TOKEN }}@github.com/${{ github.repository }}.git

      - name: Build core package
        run: npm run build -w @libretexts/davis-core

      - name: Build react package
        run: npm run build -w @libretexts/davis-react

      - name: Release react package
        env:
          GITHUB_TOKEN: ${{ secrets.LIBREBOT_ACCESS_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          GIT_COMMITTER_NAME: libretexts-bot
          GIT_COMMITTER_EMAIL: dev@libretexts.org
          GIT_AUTHOR_NAME: libretexts-bot
          GIT_AUTHOR_EMAIL: dev@libretexts.org
        run: npx semantic-release
        working-directory: packages/react

  release-vue:
    name: Release Vue Package
    runs-on: ubuntu-latest
    needs: [authorize, validate-all, release-core]
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Configure Git
        run: |
          git config --global user.name "libretexts-bot"
          git config --global user.email "dev@libretexts.org"
          git remote set-url origin https://x-access-token:${{ secrets.LIBREBOT_ACCESS_TOKEN }}@github.com/${{ github.repository }}.git

      - name: Build core package
        run: npm run build -w @libretexts/davis-core

      - name: Build vue package
        run: npm run build -w @libretexts/davis-vue

      - name: Release vue package
        env:
          GITHUB_TOKEN: ${{ secrets.LIBREBOT_ACCESS_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          GIT_COMMITTER_NAME: libretexts-bot
          GIT_COMMITTER_EMAIL: dev@libretexts.org
          GIT_AUTHOR_NAME: libretexts-bot
          GIT_AUTHOR_EMAIL: dev@libretexts.org
        run: npx semantic-release
        working-directory: packages/vue

  version-docs:
    name: Version Docs Package
    runs-on: ubuntu-latest
    needs: [authorize, validate-all, release-react, release-vue]
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Configure Git
        run: |
          git config --global user.name "libretexts-bot"
          git config --global user.email "dev@libretexts.org"
          git remote set-url origin https://x-access-token:${{ secrets.LIBREBOT_ACCESS_TOKEN }}@github.com/${{ github.repository }}.git

      - name: Build core package
        run: npm run build -w @libretexts/davis-core

      - name: Build react package
        run: npm run build -w @libretexts/davis-react

      - name: Build vue package
        run: npm run build -w @libretexts/davis-vue

      - name: Build docs package
        run: npm run build -w @libretexts/davis-docs

      - name: Version docs package
        env:
          GITHUB_TOKEN: ${{ secrets.LIBREBOT_ACCESS_TOKEN }}
          GIT_COMMITTER_NAME: libretexts-bot
          GIT_COMMITTER_EMAIL: dev@libretexts.org
          GIT_AUTHOR_NAME: libretexts-bot
          GIT_AUTHOR_EMAIL: dev@libretexts.org
        run: npx semantic-release
        working-directory: packages/docs
